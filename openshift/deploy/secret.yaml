apiVersion: v1
kind: Secret
metadata:
  name: chacra-secrets
  labels: { app: chacra }
type: Opaque
stringData:
  # Leave SECRET_KEY empty (will be auto-generated by the job)
  SECRET_KEY: ""
  
  DATABASE_URL: "postgresql://chacra:chacra@postgres:5432/chacra"   # TODO change
  CELERY_BROKER_URL: "pyamqp://chacra:chacra@rabbitmq:5672//"           # TODO change
  CELERY_RESULT_BACKEND: ""                                           # e.g., redis://, db+postgresql://, or leave empty
  
  RABBITMQ_URL: "amqp://chacra:chacra@rabbitmq:5672/%2f"
  CHACRA_DB_USER: "chacra"
  CHACRA_DB_PASS: "chacra"
  CHACRA_DB_NAME: "chacra"
  CHACRA_API_USER: "admin"
  CHACRA_API_KEY: "secret"
