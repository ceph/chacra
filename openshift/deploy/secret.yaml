apiVersion: v1
kind: Secret
metadata:
  name: chacra-secrets
  labels: { app: chacra }
type: Opaque
stringData:
  # Leave SECRET_KEY empty (will be auto-generated by the job)
  SECRET_KEY: ""
  
  DATABASE_URL: "postgresql://chacra:chacra@postgres:5432/chacra"
  CELERY_BROKER_URL: "pyamqp://chacra:chacra@rabbitmq:5672//"
  CELERY_RESULT_BACKEND: ""
  
  RABBITMQ_URL: "amqp://chacra:chacra@rabbitmq:5672/%2f"
  CHACRA_DB_USER: "chacra"
  CHACRA_DB_PASS: "chacra"
  CHACRA_DB_NAME: "chacra"
  CHACRA_API_USER: "admin"
  CHACRA_API_KEY: "secret"
  CHACRA_DB_HOST: "postgres"
  CHACRA_DB_PORT: "5432"

  # Chacra CallBack Secrets
  CHACRA_HOSTNAME: "chacra-chacra.apps.pok.os.sepia.ceph.com"
  CHACRA_CALLBACK_VERIFY_SSL: "false"
  CHACRA_CALLBACK_URL: "https://shaman-shaman.apps.pok.os.sepia.ceph.com/api/repos/"
  CHACRA_CALLBACK_USER: "admin"
  CHACRA_CALLBACK_KEY: "secret"

  # Chacra health ping URL
  CHACRA_HEALTH_PING: "true"
  CHACRA_HEALTH_PING_URL: "https://shaman-shaman.apps.pok.os.sepia.ceph.com/api/nodes/"
  CHACRA_HEALTH_PING_INTERVAL: "60"
