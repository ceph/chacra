apiVersion: batch/v1
kind: Job
metadata:
  name: chacra-db-bootstrap
  namespace: chacra
  labels: { app: chacra, job: db-bootstrap }
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: chacra, job: db-bootstrap }
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: bootstrap
          image: image-registry.openshift-image-registry.svc:5000/chacra/chacra:latest
          imagePullPolicy: Always
          command: ["/bin/sh","-lc"]
          args:
            - |
              set -euo pipefail
              echo "==> Creating schema via SQLAlchemy models, then Alembic stamp head ..."
              /opt/venv/bin/python - <<'PY'
              import os
              from sqlalchemy import create_engine
              # 1) create all tables from Chacra models
              from chacra import models  # models.Base.metadata is expected in the package
              url = os.environ["DATABASE_URL"]
              engine = create_engine(url)
              models.Base.metadata.create_all(engine)  # creates e.g. projects, repos, etc.
              # 2) alembic stamp head
              from alembic.config import Config
              from alembic import command
              cfg = Config("/alembic/alembic.ini")      # points to script_location = /alembic
              cfg.set_main_option("sqlalchemy.url", url)
              command.stamp(cfg, "head")
              print("==> Schema created and alembic stamped at head.")
              PY
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: chacra-secrets, key: DATABASE_URL }
          volumeMounts:
            - { name: alembic-ini, mountPath: /alembic/alembic.ini, subPath: alembic.ini }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: "1",  memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: alembic-ini
          configMap:
            name: chacra-alembic         
            items: [ { key: alembic.ini, path: alembic.ini } ]
