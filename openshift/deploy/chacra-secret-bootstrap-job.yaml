# openshift/deploy/chacra-secret-bootstrap-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: chacra-secret-bootstrap
  namespace: chacra
  labels: { app: chacra, job: secret-bootstrap }
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels: { app: chacra, job: secret-bootstrap }
    spec:
      serviceAccountName: chacra-bootstrap
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: registry.access.redhat.com/ubi9/python-311:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: NAMESPACE,   value: "chacra" }
            - { name: SECRET_NAME, value: "chacra-secrets" }
            - { name: DEPLOYMENT,  value: "chacra-api" }
            - { name: KEY_NAME,    value: "SECRET_KEY" }
            - { name: USER_NAME,   value: "CHACRA_API_USER" }
          command: ["/bin/sh","-lc"]
          args:
            - |
              set -euo pipefail
              python - <<'PY'
              import os, json, base64, hashlib, time, ssl, urllib.request

              NS   = os.environ["NAMESPACE"]
              S    = os.environ["SECRET_NAME"]
              DEP  = os.environ["DEPLOYMENT"]
              KEYN = os.environ["KEY_NAME"]
              USERN= os.environ["USER_NAME"]

              host = os.environ.get("KUBERNETES_SERVICE_HOST")
              port = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
              api  = f"https://{host}:{port}"

              token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
              ca_path    = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              with open(token_path,"r") as f: token = f.read().strip()
              ctx = ssl.create_default_context(cafile=ca_path)

              def req(method, url, data=None, ctype=None):
                  r = urllib.request.Request(url, data=data, method=method)
                  r.add_header("Authorization", f"Bearer {token}")
                  if ctype:
                      r.add_header("Content-Type", ctype)
                  return urllib.request.urlopen(r, context=ctx)

              # 1) GET secret
              import json as _json
              try:
                  resp = req("GET", f"{api}/api/v1/namespaces/{NS}/secrets/{S}")
                  secret = _json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      secret = {"apiVersion":"v1","kind":"Secret","metadata":{"name":S},"type":"Opaque","data":{}}
                      # create empty secret
                      data = json.dumps(secret).encode()
                      req("POST", f"{api}/api/v1/namespaces/{NS}/secrets", data, "application/json")
                      # re-get for resourceVersion
                      resp = req("GET", f"{api}/api/v1/namespaces/{NS}/secrets/{S}")
                      secret = _json.loads(resp.read())
                  else:
                      raise

              data = secret.get("data", {})

              # decode helper
              def b64get(key):
                  val = data.get(key)
                  if not val: return ""
                  return base64.b64decode(val).decode()

              cur_key  = b64get(KEYN)
              cur_user = b64get(USERN) or "admin"

              if not cur_key:
                  # generate new key
                  import secrets
                  new_key = secrets.token_urlsafe(48)
                  patch = {
                      "data": {
                          KEYN:  base64.b64encode(new_key.encode()).decode(),
                          USERN: base64.b64encode(cur_user.encode()).decode()
                      }
                  }
                  mpatch = json.dumps(patch).encode()
                  req("PATCH",
                      f"{api}/api/v1/namespaces/{NS}/secrets/{S}",
                      mpatch,
                      "application/merge-patch+json")
                  cur_key = new_key

              # 2) Patch deployment template annotation to trigger rollout
              to_hash = (cur_user + ":" + cur_key).encode()
              h = hashlib.sha256(to_hash).hexdigest()
              dpatch = {
                "spec": {
                  "template": {
                    "metadata": {
                      "annotations": {
                        "credentials-hash": h
                      }
                    }
                  }
                }
              }
              ddata = json.dumps(dpatch).encode()
              req("PATCH",
                  f"{api}/apis/apps/v1/namespaces/{NS}/deployments/{DEP}",
                  ddata,
                  "application/merge-patch+json")
              print("Secret ensured and deployment patched for rollout.")
              PY
