            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: chacra-shared-rwx }   # RWX claim
        - name: config
          configMap: { name: chacra-config }
        - name: run
          emptyDir: {}
        - name: log
          emptyDir: {}
        # <<< ADDED: secret holding prod_callbacks.py
        - name: callbacks
          secret:
            secretName: chacra-callbacks
            items:
              - key: prod_callbacks.py
                path: prod_callbacks.py

