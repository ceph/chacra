apiVersion: apps/v1
kind: Deployment
metadata:
  name: chacra-api
  namespace: chacra
  labels: { app: chacra, tier: api }
  annotations:
    image.openshift.io/triggers: |
      [
        {
          "from": { "kind": "ImageStreamTag", "name": "chacra:latest" },
          "fieldPath": "spec.template.spec.containers[?(@.name==\"api\")].image"
        }
      ]
spec:
  replicas: 2
  selector:
    matchLabels: { app: chacra, tier: api }
  template:
    metadata:
      labels: { app: chacra, tier: api }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      initContainers:
        - name: init-volumes
          image: registry.access.redhat.com/ubi9/ubi-minimal
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-lc"]
          args:
            - >
              set -e;
              mkdir -p /mnt/data/binaries /mnt/data/repos;
              echo "[init] ensured /mnt/data/binaries and /mnt/data/repos exist";
              exit 0
          volumeMounts:
            - { name: data, mountPath: /mnt/data }
      containers:
        - name: api
          image: chacra:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-lc"]
          args:
            - >
              exec /opt/venv/bin/gunicorn
              --bind 0.0.0.0:${PORT:-8000}
              --workers ${GUNICORN_WORKERS:-4}
              --timeout ${GUNICORN_TIMEOUT:-120}
              --log-level ${LOG_LEVEL:-info}
              'wsgi_wrapper:application'
          ports: [ { name: http, containerPort: 8000 } ]
          env:
            - { name: PYTHONPATH,    value: "/etc/chacra-callbacks:/opt/chacra:${PYTHONPATH}" }
            - { name: PORT,          value: "8000" }
            - { name: LOG_LEVEL,     value: "INFO" }
            - { name: STORAGE_ROOT,  value: "/data" }
            - { name: PECAN_CONFIG,  value: "/etc/chacra/config.py" }
            - { name: POLLING_CYCLE, value: "60" }
            - name: SECRET_KEY
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: SECRET_KEY } }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: DATABASE_URL } }
            - name: CHACRA_DB_USER
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_DB_USER } }  
            - name: CHACRA_DB_PASS
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_DB_PASS } }  
            - name: CHACRA_DB_HOST
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_DB_HOST } }  
            - name: CHACRA_DB_PORT
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_DB_PORT } }
            - name: CHACRA_DB_NAME
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_DB_NAME } }
            - name: CELERY_BROKER_URL
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CELERY_BROKER_URL } }
            - name: CELERY_RESULT_BACKEND
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CELERY_RESULT_BACKEND } }
            - { name: MIGRATE_ON_START, value: "false" }
            - name: CHACRA_API_USER
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_API_USER } }
            - name: CHACRA_API_KEY
              valueFrom: { secretKeyRef: { name: chacra-secrets, key: CHACRA_API_KEY } }
            - name: CHACRA_HEALTH_PING
              value: "false"
            - name: CHACRA_HEALTH_PING_URL
              value: "https://shaman-shaman.apps.pok.os.sepia.ceph.com/api"
            - name: CHACRA_HOSTNAME
              value: "chacra-api"
            - name: CHACRA_CALLBACK_VERIFY_SSL
              value: "false"  
            - name: CHACRA_CALLBACK_URL
              value: "https://shaman-shaman.apps.pok.os.sepia.ceph.com/api/repos/"
            - name: CHACRA_CALLBACK_USER
              value: "admin"
            - name: CHACRA_CALLBACK_KEY
              value: "secret"  
          volumeMounts:
            - { name: data,   mountPath: /data }
            - { name: config, mountPath: /etc/chacra }
            - { name: wsgi,   mountPath: /opt/chacra }
            - name: callbacks
              mountPath: /etc/chacra-callbacks/prod_callbacks.py
              subPath: prod_callbacks.py
              readOnly: true
          readinessProbe:
            httpGet: { path: "/", port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: "/", port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: chacra-shared-rwx }   # RWX claim
        - name: config
          configMap: { name: chacra-config }
        - name: wsgi
          configMap:
            name: chacra-wsgi
            items: [ { key: wsgi_wrapper.py, path: wsgi_wrapper.py } ]
        - name: callbacks
          secret:
            secretName: chacra-callbacks
            items:
              - key: prod_callbacks.py
                path: prod_callbacks.py

