apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chacra-shared-rwx
  namespace: chacra
  labels:
    app: chacra
spec:
  # REQUIRED: Replace with an RWX-capable StorageClass available in your cluster
  # Examples: cephfs-rwx, ocs-storagecluster-cephfs, nfs-rwx
  storageClassName: STORAGE_CLASS_NAME
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: STORAGE_SIZE
